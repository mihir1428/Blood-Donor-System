<script>
  const user = JSON.parse(localStorage.getItem("user"));
  if (user) {
    if (document.getElementById("requestName")) {
      document.getElementById("requestName").value = user.name || "";
    }
    if (document.getElementById("requestEmail")) {
      document.getElementById("requestEmail").value = user.email || "";
    }
    if (document.getElementById("requestBloodGroup")) {
      document.getElementById("requestBloodGroup").value = user.blood_group || "";
    }
    if (document.getElementById("requestLocation")) {
      document.getElementById("requestLocation").value = user.location || "";
    }
    if (document.getElementById("requestPhone")) {
      document.getElementById("requestPhone").value = user.phone || "";
    }
  }
</script>
