<!DOCTYPE html>
<html>
<head>
  <title>Donor Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container wide-container">
    <div class="card">

      <div class="dashboard-header-row">
        <div>
          <h2>Donor Dashboard</h2>
          <p class="muted-text">Manage your donor profile and see emergency alerts.</p>
        </div>

        <div style="display:flex; align-items:center; gap:14px;">
          <div
            onclick="toggleEmergencyPanel()"
            style="position:relative; cursor:pointer; font-size:30px; user-select:none;"
            title="Emergency Notifications"
          >
            🔔
            <span
              id="notificationBadge"
              style="
                display:none;
                position:absolute;
                top:-8px;
                right:-10px;
                background:red;
                color:white;
                border-radius:50%;
                min-width:22px;
                height:22px;
                font-size:12px;
                font-weight:bold;
                text-align:center;
                line-height:22px;
                padding:0 4px;
              "
            >0</span>
          </div>

          <button type="button" onclick="logoutUser()">Logout</button>
        </div>
      </div>

      <div class="card inner-card">
        <h3>Donor Profile</h3>
        <p><strong>Name:</strong> <span id="profileName"></span></p>
        <p><strong>Email:</strong> <span id="profileEmail"></span></p>
        <p><strong>Eligibility:</strong> <span id="eligibilityStatus" class="status-available">Eligible now</span></p>
      </div>

      <div
        id="emergencyNotificationPanel"
        class="card inner-card"
        style="margin-top: 20px; display:none;"
      >
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
          <div>
            <h3 style="margin-bottom:6px;">Emergency Requests</h3>
            <p class="muted-text">Click the bell icon anytime to see pending emergency requests.</p>
          </div>
          <button type="button" onclick="loadDonorEmergencyNotifications()">Refresh</button>
        </div>

        <div id="emergencyNotificationList" style="margin-top: 16px;">
          <p>No emergency notification</p>
        </div>
      </div>

      <div class="card inner-card" style="margin-top: 20px;">
        <h3>Update Profile</h3>
        <form onsubmit="updateDonorProfile(); return false;">
          <label>Blood Group</label>
          <select id="blood_group" required>
            <option value="">Select Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>

          <label>Location</label>
          <select id="location" required>
            <option value="">Select District</option>
            <option value="Bagerhat">Bagerhat</option>
            <option value="Bandarban">Bandarban</option>
            <option value="Barguna">Barguna</option>
            <option value="Barishal">Barishal</option>
            <option value="Bhola">Bhola</option>
            <option value="Bogura">Bogura</option>
            <option value="Brahmanbaria">Brahmanbaria</option>
            <option value="Chandpur">Chandpur</option>
            <option value="Chattogram">Chattogram</option>
            <option value="Chuadanga">Chuadanga</option>
            <option value="Cox's Bazar">Cox's Bazar</option>
            <option value="Cumilla">Cumilla</option>
            <option value="Dhaka">Dhaka</option>
            <option value="Dinajpur">Dinajpur</option>
            <option value="Faridpur">Faridpur</option>
            <option value="Feni">Feni</option>
            <option value="Gaibandha">Gaibandha</option>
            <option value="Gazipur">Gazipur</option>
            <option value="Gopalganj">Gopalganj</option>
            <option value="Habiganj">Habiganj</option>
            <option value="Jamalpur">Jamalpur</option>
            <option value="Jashore">Jashore</option>
            <option value="Jhalokathi">Jhalokathi</option>
            <option value="Jhenaidah">Jhenaidah</option>
            <option value="Joypurhat">Joypurhat</option>
            <option value="Khagrachari">Khagrachari</option>
            <option value="Khulna">Khulna</option>
            <option value="Kishoreganj">Kishoreganj</option>
            <option value="Kurigram">Kurigram</option>
            <option value="Kushtia">Kushtia</option>
            <option value="Lakshmipur">Lakshmipur</option>
            <option value="Lalmonirhat">Lalmonirhat</option>
            <option value="Madaripur">Madaripur</option>
            <option value="Magura">Magura</option>
            <option value="Manikganj">Manikganj</option>
            <option value="Meherpur">Meherpur</option>
            <option value="Moulvibazar">Moulvibazar</option>
            <option value="Munshiganj">Munshiganj</option>
            <option value="Mymensingh">Mymensingh</option>
            <option value="Naogaon">Naogaon</option>
            <option value="Narail">Narail</option>
            <option value="Narayanganj">Narayanganj</option>
            <option value="Narsingdi">Narsingdi</option>
            <option value="Natore">Natore</option>
            <option value="Netrokona">Netrokona</option>
            <option value="Nilphamari">Nilphamari</option>
            <option value="Noakhali">Noakhali</option>
            <option value="Pabna">Pabna</option>
            <option value="Panchagarh">Panchagarh</option>
            <option value="Patuakhali">Patuakhali</option>
            <option value="Pirojpur">Pirojpur</option>
            <option value="Rajbari">Rajbari</option>
            <option value="Rajshahi">Rajshahi</option>
            <option value="Rangamati">Rangamati</option>
            <option value="Rangpur">Rangpur</option>
            <option value="Satkhira">Satkhira</option>
            <option value="Shariatpur">Shariatpur</option>
            <option value="Sherpur">Sherpur</option>
            <option value="Sirajganj">Sirajganj</option>
            <option value="Sunamganj">Sunamganj</option>
            <option value="Sylhet">Sylhet</option>
            <option value="Tangail">Tangail</option>
            <option value="Thakurgaon">Thakurgaon</option>
          </select>

          <label>Contact</label>
          <input type="text" id="phone" placeholder="Phone Number" required>

          <label>Last Donation</label>
          <input type="date" id="last_donation">

          <button type="submit">Update Profile</button>
        </form>
      </div>

      <div class="card inner-card" style="margin-top: 20px;">
        <h3>Availability</h3>
        <select id="availability">
          <option value="1">Available</option>
          <option value="0">Not Available</option>
        </select>
        <button type="button" onclick="updateAvailability()">Update Status</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) {
      window.location.href = "login.html";
    }

    loadDonorProfile();
    loadDonorEmergencyNotifications();

    setInterval(() => {
      loadDonorEmergencyNotifications();
    }, 10000);
  </script>
</body>
</html>
